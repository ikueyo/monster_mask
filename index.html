<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Orbitron:wght@700;900&display=swap');
:root{
  --green:#00ff88;--blue:#00d4ff;--pink:#ff3cac;
  --yellow:#ffe600;--orange:#ff7f00;
  --dark:#07071a;--border:rgba(255,255,255,0.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'Nunito',sans-serif;color:#fff;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;
}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;}
/* header */
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;border-bottom:1px solid var(--border);background:rgba(7,7,26,.9);gap:8px;}
#hdr h1{font-family:'Orbitron',monospace;font-size:clamp(.85rem,3vw,1.3rem);font-weight:900;letter-spacing:.06em;background:linear-gradient(90deg,var(--green),var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
#version-badge{font-size:.6rem;font-weight:800;background:var(--pink);color:#fff;padding:2px 7px;border-radius:20px;flex-shrink:0;}
/* status */
#status-bar{display:flex;align-items:center;gap:7px;font-size:clamp(.62rem,1.8vw,.78rem);background:rgba(0,0,0,.3);padding:4px 12px;flex-shrink:0;border-bottom:1px solid var(--border);}
#st-dot{width:9px;height:9px;border-radius:50%;background:#555;box-shadow:0 0 5px #555;flex-shrink:0;transition:background .3s,box-shadow .3s;}
#st-dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
#st-dot.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:blink .8s ease-in-out infinite;}
#st-dot.red{background:#ff3344;box-shadow:0 0 8px #ff3344;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
#st-txt{color:rgba(255,255,255,.75);flex:1;}
#dbg-ball{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;animation:bounce .55s ease-in-out infinite alternate;}
#dbg-ball.dead{background:#ff3344;animation:none;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-5px);}}
/* tabs */
#tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--border);background:rgba(7,7,26,.9);}
.tab{flex:1;padding:9px 4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:clamp(.65rem,2vw,.82rem);background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;letter-spacing:.03em;border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s;}
.tab.active{color:#fff;border-bottom-color:var(--green);}
/* content */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.panel{display:none;flex-direction:column;align-items:center;flex:1;overflow:hidden;width:100%;}
.panel.active{display:flex;}
/* canvas areas */
#canvas-wrap,#det-canvas-wrap{flex:1;width:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:0;}
/* AR controls */
#ar-controls{flex-shrink:0;width:100%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:7px;padding:8px 10px env(safe-area-inset-bottom,12px);background:rgba(7,7,26,.97);border-top:1px solid var(--border);}
/* detect legend */
#det-legend{flex-shrink:0;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px 10px env(safe-area-inset-bottom,10px);background:rgba(7,7,26,.97);border-top:1px solid var(--border);width:100%;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:clamp(.6rem,1.7vw,.72rem);background:rgba(255,255,255,.07);border-radius:20px;padding:3px 10px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* buttons */
.btn{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(.68rem,2.2vw,.85rem);border:none;border-radius:50px;padding:8px 16px;cursor:pointer;letter-spacing:.03em;transition:transform .12s,filter .12s;}
.btn:active{transform:scale(.93);}
.btn-green{background:linear-gradient(135deg,var(--green),#00aaff);color:var(--dark);}
.btn-pink{background:linear-gradient(135deg,var(--pink),#ff6600);color:#fff;}
.btn-yellow{background:linear-gradient(135deg,var(--yellow),var(--orange));color:var(--dark);}
.btn-purple{background:linear-gradient(135deg,#9900ff,var(--blue));color:#fff;}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
/* alpha slider */
#alpha-slider{-webkit-appearance:none;appearance:none;width:80px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);outline:none;cursor:pointer;}
#alpha-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--green);cursor:pointer;}
/* flash */
#flash{position:fixed;inset:0;z-index:200;background:#fff;opacity:0;pointer-events:none;}
#flash.pop{animation:flashAnim .35s ease-out forwards;}
@keyframes flashAnim{0%{opacity:.9;}100%{opacity:0;}}
/* snapshot */
#snap-wrap{position:absolute;top:8px;right:8px;z-index:20;display:none;flex-direction:column;align-items:center;gap:4px;}
#snap-img{width:80px;border-radius:10px;border:2px solid var(--yellow);}
#btn-dl{font-size:.62rem;background:var(--yellow);color:var(--dark);border:none;border-radius:20px;padding:3px 10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;}
/* hidden video */
#cam-video{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;}
/* template panel */
#panel-template{overflow-y:auto;padding:16px;gap:14px;align-items:stretch;}
.tpl-header{text-align:center;padding:8px 0 4px;}
.tpl-header h2{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1rem,3vw,1.4rem);background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tpl-header p{font-size:clamp(.7rem,2vw,.82rem);color:rgba(255,255,255,.5);margin-top:4px;}
#template-canvas-wrap{display:flex;justify-content:center;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;}
#templateCanvas{border-radius:8px;max-width:100%;height:auto;}
.tpl-instructions{background:rgba(0,255,136,.06);border:1.5px solid rgba(0,255,136,.2);border-radius:16px;padding:16px 18px;display:flex;flex-direction:column;gap:8px;}
.tpl-instructions h3{font-family:'Orbitron',monospace;font-size:clamp(.72rem,2vw,.85rem);color:var(--green);letter-spacing:.06em;}
.instr-item{display:flex;align-items:flex-start;gap:8px;font-size:clamp(.68rem,1.8vw,.78rem);color:rgba(255,255,255,.7);line-height:1.55;}
.instr-num{background:var(--green);color:var(--dark);font-weight:900;font-size:.65rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.tpl-btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
#panel-template::-webkit-scrollbar{width:4px;}
#panel-template::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
#file-input{display:none;}
/* preset monsters */
#preset-row{flex-shrink:0;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 10px 3px;background:rgba(7,7,26,.97);}
.preset-btn{font-size:1.25rem;width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.preset-btn:hover{transform:scale(1.15);border-color:rgba(0,255,136,.5);}
.preset-btn.active{border-color:var(--green);box-shadow:0 0 10px rgba(0,255,136,.4);background:rgba(0,255,136,.1);}
.preset-label{font-size:.62rem;color:rgba(255,255,255,.32);letter-spacing:.02em;}
/* alpha slider */
.alpha-wrap{display:flex;align-items:center;gap:5px;}
.alpha-label{font-size:.72rem;}
.alpha-val{font-size:.65rem;color:var(--green);font-weight:900;min-width:30px;text-align:right;}
/* gallery */
#gallery-wrap{flex-shrink:0;width:100%;padding:4px 10px 2px;background:rgba(7,7,26,.97);}
#gallery-strip{display:flex;gap:6px;align-items:center;min-height:46px;overflow-x:auto;scrollbar-width:none;}
#gallery-strip::-webkit-scrollbar{display:none;}
.gallery-thumb{width:42px;height:42px;object-fit:cover;border-radius:7px;border:1.5px solid rgba(255,230,0,.4);cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s;}
.gallery-thumb:hover{transform:scale(1.12);border-color:var(--yellow);}
.gallery-empty{font-size:.6rem;color:rgba(255,255,255,.3);}
/* zone pills */
.zone-legend{display:flex;flex-wrap:wrap;gap:5px;padding:6px 14px;justify-content:center;}
.zone-pill{font-size:.62rem;padding:2px 9px;border-radius:20px;font-weight:700;border-width:1px;border-style:solid;}
/* button hover lift */
.btn:hover{filter:brightness(1.1) drop-shadow(0 0 5px rgba(255,255,255,.15));transform:translateY(-2px);}
/* update banner */
#update-bar{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--green);color:var(--dark);text-align:center;padding:13px 16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(.78rem,2.5vw,.92rem);cursor:pointer;transform:translateY(-100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);-webkit-tap-highlight-color:transparent;}
#update-bar.show{transform:translateY(0);}

</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
/* ═══════════════════════════════════════════════
   怪物變身鏡 v3
   臉部偵測：MediaPipe FaceMesh（取代 ml5 FaceApi）
   ✅ 支援 file://、CodePen、GitHub Pages
   ✅ 478 個特徵點，偵測更快更準
   ═══════════════════════════════════════════════ */

// ── Globals ──────────────────────────────────
const video      = document.getElementById('cam-video');
let   faceMesh   = null;
let   landmarks  = [];   // 最新一幀的 468 個點 [{x,y,z}, ...]
let   faceBox    = null; // {x,y,w,h} normalised
let   camReady   = false;
let   faceReady  = false;
let   flipped    = true;
let   monsterImg = null;
let   monsterAlpha = 210;
let   activeTab  = 'ar';
let   errCount   = 0;
// celebration & countdown
let particles = [], faceFirstDetected = false;
let countdown = 0, countdownTimer = null;
// AI stats
let lastDetectTime = Date.now(), frameMs = 16;

// DOM
const stDot  = document.getElementById('st-dot');
const stTxt  = document.getElementById('st-txt');
const dbgBall= document.getElementById('dbg-ball');
const flash  = document.getElementById('flash');
const snapW  = document.getElementById('snap-wrap');
const snapI  = document.getElementById('snap-img');
const btnDl  = document.getElementById('btn-dl');
const fileIn = document.getElementById('file-input');
const alphaS = document.getElementById('alpha-slider');
const arCnv  = document.getElementById('arCanvas');
const detCnv = document.getElementById('detCanvas');
const arCtx  = arCnv.getContext('2d');
const detCtx = detCnv.getContext('2d');

function setStatus(cls, msg){
  stDot.className = cls;
  stTxt.textContent = msg;
}

// ── Camera button state ───────────────────────
const btnStart = document.getElementById('btn-start');
function updateCamBtn(state){
  if(state === 'idle'){
    btnStart.textContent = '📷 啟動鏡頭';
    btnStart.className = 'btn btn-green';
    btnStart.disabled = false;
  } else if(state === 'loading'){
    btnStart.textContent = '⏳ 啟動中…';
    btnStart.className = 'btn btn-ghost';
    btnStart.disabled = true;
  } else if(state === 'active'){
    btnStart.textContent = '⏹ 停止相機';
    btnStart.className = 'btn btn-pink';
    btnStart.disabled = false;
  }
}

function stopCamera(){
  if(video.srcObject){
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  camReady = false;
  faceReady = false;
  faceFirstDetected = false;
  landmarks = [];
  faceBox = null;
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; countdown=0; }
  particles = [];
  snapW.style.display = 'none';
  updateCamBtn('idle');
  setStatus('', '等待啟動…');
}

// ── MediaPipe FaceMesh Groups (478 pts) ─────
// 簡化版 index groups，對應 MediaPipe canonical model
const MP = {
  // 臉部輪廓（外圈）
  silhouette:[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109],
  // 左眼
  leftEye:[33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246],
  // 右眼
  rightEye:[362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398],
  // 左眉
  leftBrow:[70,63,105,66,107,55,65,52,53,46],
  // 右眉
  rightBrow:[300,293,334,296,336,285,295,282,283,276],
  // 鼻子
  nose:[168,6,197,195,5,4,1,19,94,2,98,97,2,326,327],
  // 嘴唇外圈
  outerLips:[61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146],
  // 嘴唇內圈
  innerLips:[78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95],
};

// ── Canvas resize ────────────────────────────
function resizeCanvas(cnv){
  const wrap = cnv.parentElement;
  cnv.width  = wrap.clientWidth;
  cnv.height = wrap.clientHeight;
}
window.addEventListener('resize', () => {
  resizeCanvas(arCnv);
  resizeCanvas(detCnv);
});

// ── Helpers ──────────────────────────────────
function camLayout(cnv){
  if(!camReady || !video.videoWidth) return null;
  const vw=video.videoWidth, vh=video.videoHeight;
  const sc=Math.max(cnv.width/vw, cnv.height/vh);
  const dw=vw*sc, dh=vh*sc;
  const dx=(cnv.width-dw)/2, dy=(cnv.height-dh)/2;
  return {sc,dw,dh,dx,dy,vw,vh};
}

function lmToCanvas(lm, layout, mirrorW){
  // lm.x, lm.y are 0-1 normalised to video
  let px = lm.x * layout.vw * layout.sc + layout.dx;
  let py = lm.y * layout.vh * layout.sc + layout.dy;
  if(flipped) px = mirrorW - px;
  return {x:px, y:py};
}

// ── TAB 1: AR Draw ────────────────────────────
function drawAR(){
  const ctx = arCtx;
  const W = arCnv.width, H = arCnv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0,0,W,H);

  if(!camReady){ drawWelcomeAnimation(ctx,W,H); return; }

  const lay = camLayout(arCnv);
  if(!lay) return;

  // draw video (mirrored if needed)
  ctx.save();
  if(flipped){ ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.drawImage(video, lay.dx, lay.dy, lay.dw, lay.dh);
  ctx.restore();

  // overlay monster
  if(faceReady && landmarks.length > 0){
    drawMonsterOverlay(ctx, lay, W);
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.fillRect(5, H-22, 200, 16);
  ctx.fillStyle='#00ff88';
  ctx.font=`${clamp(9,W*.018,13)}px Nunito,sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  const n = landmarks.length > 0 ? 1 : 0;
  ctx.fillText(`👤 偵測 ${n} 張臉 | 透明度 ${Math.round(monsterAlpha/255*100)}%`, 8, H-20);

  // Particles
  updateParticles(ctx);

  // Countdown overlay
  if(countdown > 0){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.38)'; ctx.fillRect(0,0,W,H);
    ctx.font=`900 ${clamp(55,W*.28,120)}px Nunito,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const cdColor = countdown===1?'#ff3cac':countdown===2?'#ffe600':'#00ff88';
    ctx.shadowColor=cdColor; ctx.shadowBlur=50;
    ctx.fillStyle=cdColor;
    ctx.fillText(countdown, W/2, H*.45);
    ctx.restore();
  }
}

function drawMonsterOverlay(ctx, lay, W){
  // 取臉部輪廓點算 bounding box（直接走訪，避免 spread 開銷）
  const idxs = MP.silhouette;
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  for(let i=0;i<idxs.length;i++){
    const p=lmToCanvas(landmarks[idxs[i]], lay, W);
    if(p.x<minX) minX=p.x; if(p.x>maxX) maxX=p.x;
    if(p.y<minY) minY=p.y; if(p.y>maxY) maxY=p.y;
  }

  const fw = (maxX-minX)*1.45;
  const fh = (maxY-minY)*1.65;
  const fx = minX - (fw-(maxX-minX))/2;
  const fy = minY - fh*0.23;

  // 只有上傳怪物圖片後才顯示
  if(monsterImg){
    ctx.save();
    ctx.globalAlpha = monsterAlpha/255;
    ctx.drawImage(monsterImg, fx, fy, fw, fh);
    ctx.restore();
  }
}

// ── TAB 2: Detection Draw ─────────────────────
function drawDetect(){
  const ctx = detCtx;
  const W = detCnv.width, H = detCnv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a1e';
  ctx.fillRect(0,0,W,H);

  if(!camReady){
    ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.font=`${clamp(12,W*.028,20)}px Nunito,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('先在「AR 變身」啟動鏡頭', W/2, H/2-12);
    ctx.font=`${clamp(10,W*.022,15)}px Nunito,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.fillText('然後切回此頁查看偵測結果', W/2, H/2+14);
    return;
  }

  const lay = camLayout(detCnv);
  if(!lay) return;

  // ✅ 與 AR 分頁一致：套用相同的鏡像翻轉
  ctx.save();
  if(flipped){ ctx.translate(W,0); ctx.scale(-1,1); }
  ctx.drawImage(video, lay.dx, lay.dy, lay.dw, lay.dh);
  ctx.restore();

  if(!faceReady || landmarks.length === 0) return;

  // lmToCanvas 內部已根據 flipped 做鏡像，W 傳入即可

  // bounding box from silhouette（直接走訪，避免 spread 開銷）
  const silIdxs = MP.silhouette;
  let sMinX=Infinity, sMaxX=-Infinity, sMinY=Infinity, sMaxY=-Infinity;
  for(let i=0;i<silIdxs.length;i++){
    const p=lmToCanvas(landmarks[silIdxs[i]], lay, W);
    if(p.x<sMinX) sMinX=p.x; if(p.x>sMaxX) sMaxX=p.x;
    if(p.y<sMinY) sMinY=p.y; if(p.y>sMaxY) sMaxY=p.y;
  }
  const bx=sMinX-6, by=sMinY-6;
  const bw=sMaxX-bx+12, bh=sMaxY-by+12;

  ctx.save();
  ctx.strokeStyle='rgba(0,255,136,.8)';
  ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(bx,by,bw,bh);
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(0,255,136,.9)';
  ctx.font=`bold ${clamp(9,W*.018,13)}px Nunito,sans-serif`;
  ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText('臉部', bx+4, by-2);
  ctx.restore();

  // draw each group
  const groups=[
    {key:'silhouette', color:'#00ff88',  label:'臉型', labelIdx:0,  close:true },
    {key:'leftBrow',   color:'#cc88ff',  label:'左眉', labelIdx:3,  close:false},
    {key:'rightBrow',  color:'#cc88ff',  label:'右眉', labelIdx:3,  close:false},
    {key:'leftEye',    color:'#00d4ff',  label:'左眼', labelIdx:0,  close:true },
    {key:'rightEye',   color:'#ff3cac',  label:'右眼', labelIdx:0,  close:true },
    {key:'nose',       color:'#ffe600',  label:'鼻',   labelIdx:0,  close:false},
    {key:'outerLips',  color:'#ff7f00',  label:'嘴巴', labelIdx:0,  close:true },
  ];

  for(const g of groups){
    const idxs = MP[g.key];
    const pts  = idxs.map(i => lmToCanvas(landmarks[i], lay, W));
    ctx.save();
    ctx.strokeStyle = g.color + 'aa';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    if(g.close) ctx.closePath();
    ctx.stroke();

    // dots
    ctx.fillStyle = g.color;
    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, clamp(2,W*.004,5), 0, Math.PI*2);
      ctx.fill();
    });

    // label
    const lp = pts[g.labelIdx] || pts[0];
    if(lp){
      ctx.font=`bold ${clamp(8,W*.016,12)}px Nunito,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      const tw = ctx.measureText(g.label).width + 8;
      ctx.fillStyle='rgba(0,0,0,.7)';
      ctx.fillRect(lp.x-tw/2, lp.y-16, tw, 14);
      ctx.fillStyle=g.color;
      ctx.fillText(g.label, lp.x, lp.y-4);
    }
    ctx.restore();
  }

  // AI Stats HUD overlay
  drawAIHud(ctx, W, H);
}

// ── Welcome animation (shown when camera is off) ──
function drawWelcomeAnimation(ctx,W,H){
  const t=Date.now()/1000;
  const pulse=0.93+Math.sin(t*1.8)*0.07;
  const cx=W/2, cy=H*0.44;
  const rw=W*0.22*pulse, rh=H*0.36*pulse;

  // Pulsing face oval
  ctx.save();
  ctx.shadowColor='#00ff88'; ctx.shadowBlur=18+Math.sin(t*2)*8;
  ctx.strokeStyle=`rgba(0,255,136,${0.45+Math.sin(t*2)*0.2})`;
  ctx.lineWidth=1.5; ctx.setLineDash([10,6]);
  ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Scan line
  const scanY=cy-rh+((t*70)%(rh*2));
  if(scanY>cy-rh&&scanY<cy+rh){
    ctx.save();
    ctx.strokeStyle='rgba(0,255,136,.18)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx-rw*.9,scanY); ctx.lineTo(cx+rw*.9,scanY); ctx.stroke();
    ctx.restore();
  }

  // Eyes
  const eyeY=cy-rh*0.22, ep=0.85+Math.sin(t*3.5)*0.15;
  [[cx-rw*.43,'#00d4ff'],[cx+rw*.43,'#ff3cac']].forEach(([ex,col])=>{
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.fillStyle=col; ctx.globalAlpha=0.55+Math.sin(t*2.5)*0.25;
    ctx.beginPath(); ctx.ellipse(ex,eyeY,rw*.13*ep,rh*.08*ep,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Nose dots
  ctx.fillStyle='rgba(255,230,0,.6)';
  [-rw*.07,rw*.07].forEach(dx=>{
    ctx.beginPath(); ctx.arc(cx+dx,cy+rh*.05,2.5,0,Math.PI*2); ctx.fill();
  });

  // Mouth
  ctx.save();
  ctx.shadowColor='#ff3cac'; ctx.shadowBlur=8;
  ctx.strokeStyle=`rgba(255,60,172,${0.6+Math.sin(t*1.5)*0.2})`;
  ctx.lineWidth=2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(cx,cy+rh*.25,rw*.32,.12*Math.PI,.88*Math.PI); ctx.stroke();
  ctx.restore();

  // Corner brackets
  const bx=cx-rw*1.2,by=cy-rh*1.15,bw=rw*2.4,bh=rh*2.3,bl=Math.min(bw,bh)*.1;
  ctx.strokeStyle='rgba(0,255,136,.45)'; ctx.lineWidth=2; ctx.setLineDash([]);
  [[bx,by,1,1],[bx+bw,by,-1,1],[bx,by+bh,1,-1],[bx+bw,by+bh,-1,-1]].forEach(([x,y,sx,sy])=>{
    ctx.beginPath(); ctx.moveTo(x+sx*bl,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy*bl); ctx.stroke();
  });

  // CTA text (pulsing)
  const a=0.7+Math.sin(t*1.3)*0.25;
  ctx.fillStyle=`rgba(255,255,255,${a})`;
  ctx.font=`900 ${clamp(13,W*.032,20)}px Nunito,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('點擊畫面或按下方按鈕開始變身！',W/2,H*.83);
  ctx.font=`${clamp(10,W*.022,13)}px Nunito,sans-serif`;
  ctx.fillStyle=`rgba(0,255,136,${0.4+Math.sin(t)*.2})`;
  ctx.fillText('將臉對準輪廓框框 👆',W/2,H*.89);
}

// ── Preset monster factory ────────────────────
function makePresetCanvas(id){
  const W=400,H=460,c=document.createElement('canvas');
  c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  const cx=W/2,cy=H*.5;
  ({devil:drawPresetDevil,robot:drawPresetRobot,alien:drawPresetAlien,skull:drawPresetSkull})[id]
    ?.(ctx,cx,cy,W,H);
  return c;
}

function drawPresetDevil(ctx,cx,cy,W,H){
  // Horns
  [[cx-W*.18,cx-W*.26,cx-W*.30,cx-W*.22,cx-W*.14,cx-W*.16],
   [cx+W*.18,cx+W*.26,cx+W*.30,cx+W*.22,cx+W*.14,cx+W*.16]].forEach(([x0,bx1,bx2,tx,rx1,rx2])=>{
    ctx.fillStyle='#bb1111';
    ctx.beginPath();
    ctx.moveTo(x0,cy-H*.28);
    ctx.bezierCurveTo(bx1,cy-H*.38,bx2,cy-H*.52,tx,cy-H*.56);
    ctx.bezierCurveTo(rx1,cy-H*.52,rx2,cy-H*.40,x0<cx?cx-W*.16:cx+W*.16,cy-H*.28);
    ctx.closePath(); ctx.fill();
  });
  // Eyebrows
  ctx.strokeStyle='#440000'; ctx.lineWidth=W*.03; ctx.lineCap='round';
  [[-1,1]].forEach(()=>{
    [-1,1].forEach(s=>{
      ctx.beginPath();
      ctx.moveTo(cx+s*W*.30,cy-H*.165); ctx.lineTo(cx+s*W*.12,cy-H*.11); ctx.stroke();
    });
  });
  // Eyes
  [-1,1].forEach(s=>{
    const ex=cx+s*W*.2,ey=cy-H*.04;
    const g=ctx.createRadialGradient(ex,ey,0,ex,ey,W*.12);
    g.addColorStop(0,'rgba(255,230,0,.9)'); g.addColorStop(.5,'rgba(255,100,0,.5)'); g.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(ex,ey,W*.12,H*.075,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.85)'; ctx.beginPath(); ctx.ellipse(ex,ey,W*.022,H*.065,0,0,Math.PI*2); ctx.fill();
  });
  // Nose
  ctx.fillStyle='rgba(100,0,0,.45)';
  ctx.beginPath(); ctx.moveTo(cx,cy+H*.09); ctx.lineTo(cx-W*.055,cy+H*.17); ctx.lineTo(cx+W*.055,cy+H*.17); ctx.fill();
  // Mouth + fangs
  ctx.fillStyle='rgba(15,0,0,.8)';
  ctx.beginPath(); ctx.moveTo(cx-W*.22,cy+H*.22); ctx.quadraticCurveTo(cx,cy+H*.35,cx+W*.22,cy+H*.22); ctx.quadraticCurveTo(cx,cy+H*.28,cx-W*.22,cy+H*.22); ctx.fill();
  ctx.fillStyle='#f0f0f0';
  [[-W*.12,-W*.15,-W*.09],[W*.12,W*.15,W*.09]].forEach(([a,b,c2])=>{
    ctx.beginPath(); ctx.moveTo(cx+a,cy+H*.22); ctx.lineTo(cx+b,cy+H*.31); ctx.lineTo(cx+c2,cy+H*.22); ctx.fill();
  });
}

function drawPresetRobot(ctx,cx,cy,W,H){
  // Antenna
  ctx.strokeStyle='#00d4ff'; ctx.lineWidth=W*.018; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy-H*.38); ctx.lineTo(cx,cy-H*.54); ctx.stroke();
  const ag=ctx.createRadialGradient(cx,cy-H*.57,0,cx,cy-H*.57,W*.06);
  ag.addColorStop(0,'#fff'); ag.addColorStop(.4,'#00d4ff'); ag.addColorStop(1,'rgba(0,212,255,0)');
  ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(cx,cy-H*.57,W*.06,0,Math.PI*2); ctx.fill();
  // Eyes (hex outline)
  [[cx-W*.2,'#00d4ff'],[cx+W*.2,'#00ff88']].forEach(([ex,col])=>{
    const ey=cy-H*.04, r=W*.11;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/6; ctx.lineTo(ex+r*Math.cos(a),ey+r*.65*Math.sin(a));}
    ctx.closePath(); ctx.strokeStyle=col; ctx.lineWidth=W*.014; ctx.stroke();
    ctx.fillStyle=col.replace('#','').match(/.{2}/g).reduce((_,_2,i,a)=>
      i===0?`rgba(${parseInt(a[0],16)},${parseInt(a[1],16)},${parseInt(a[2],16)},0.15)`:_,'');
    ctx.fill();
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(ex,ey,W*.035,0,Math.PI*2); ctx.fill();
  });
  // Forehead grid
  ctx.strokeStyle='rgba(0,212,255,.22)'; ctx.lineWidth=1;
  for(let x=cx-W*.3;x<=cx+W*.31;x+=W*.12){ctx.beginPath();ctx.moveTo(x,cy-H*.37);ctx.lineTo(x,cy-H*.13);ctx.stroke();}
  for(let y=cy-H*.37;y<=cy-H*.12;y+=H*.08){ctx.beginPath();ctx.moveTo(cx-W*.3,y);ctx.lineTo(cx+W*.3,y);ctx.stroke();}
  // Mouth panel
  const [mx,my,mw,mh]=[cx-W*.24,cy+H*.19,W*.48,H*.10];
  ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='#00d4ff'; ctx.lineWidth=W*.012; ctx.strokeRect(mx,my,mw,mh);
  ctx.strokeStyle='rgba(0,212,255,.45)'; ctx.lineWidth=1;
  for(let i=1;i<7;i++){const sx=mx+i*(mw/7);ctx.beginPath();ctx.moveTo(sx,my+2);ctx.lineTo(sx,my+mh-2);ctx.stroke();}
  // Nose triangle
  ctx.strokeStyle='rgba(0,255,136,.5)'; ctx.lineWidth=W*.013; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(cx,cy+H*.06); ctx.lineTo(cx-W*.055,cy+H*.16); ctx.lineTo(cx+W*.055,cy+H*.16); ctx.closePath(); ctx.stroke();
}

function drawPresetAlien(ctx,cx,cy,W,H){
  // Head glow
  const hg=ctx.createRadialGradient(cx,cy-H*.15,0,cx,cy-H*.15,W*.4);
  hg.addColorStop(0,'rgba(0,200,80,.12)'); hg.addColorStop(1,'rgba(0,200,80,0)');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.ellipse(cx,cy-H*.15,W*.4,H*.38,0,0,Math.PI*2); ctx.fill();
  // Big almond eyes
  [-1,1].forEach((s,i)=>{
    const ex=cx+s*W*.2,ey=cy-H*.06;
    ctx.save(); ctx.translate(ex,ey); ctx.rotate(s*0.25);
    ctx.fillStyle='rgba(0,0,0,.88)'; ctx.beginPath(); ctx.ellipse(0,0,W*.18,H*.12,0,0,Math.PI*2); ctx.fill();
    const g=ctx.createRadialGradient(0,H*.02,0,0,0,W*.1);
    g.addColorStop(0,'rgba(120,0,220,.7)'); g.addColorStop(1,'rgba(60,0,100,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(0,0,W*.1,H*.07,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  // Nose slits
  ctx.fillStyle='rgba(0,180,60,.5)';
  [-W*.04,W*.04].forEach(dx=>{ctx.beginPath();ctx.ellipse(cx+dx,cy+H*.11,W*.025,H*.022,0,0,Math.PI*2);ctx.fill();});
  // Thin mouth
  ctx.strokeStyle='rgba(0,200,80,.6)'; ctx.lineWidth=W*.015; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-W*.12,cy+H*.21); ctx.lineTo(cx+W*.12,cy+H*.21); ctx.stroke();
  // Vein lines
  ctx.strokeStyle='rgba(0,200,80,.2)'; ctx.lineWidth=W*.01;
  [[-1,1],[1,-1]].forEach(([s])=>{
    ctx.beginPath();
    ctx.moveTo(cx+s*W*.1,cy-H*.42);
    ctx.bezierCurveTo(cx+s*W*.2,cy-H*.32,cx+s*W*.25,cy-H*.2,cx+s*W*.18,cy-H*.12);
    ctx.stroke();
  });
}

function drawPresetSkull(ctx,cx,cy,W,H){
  // Eye sockets（上移並縮小，避免蓋到鼻子）
  [-1,1].forEach(s=>{
    const ex=cx+s*W*.2, ey=cy-H*.09;
    ctx.fillStyle='rgba(0,0,0,.85)'; ctx.beginPath(); ctx.ellipse(ex,ey,W*.12,H*.085,0,0,Math.PI*2); ctx.fill();
    const g=ctx.createRadialGradient(ex,ey+H*.02,0,ex,ey,W*.10);
    g.addColorStop(0,'rgba(140,0,0,.4)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(ex,ey,W*.12,H*.085,0,0,Math.PI*2); ctx.fill();
  });
  // Nose cavity（上移）
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.beginPath(); ctx.moveTo(cx,cy+H*.01); ctx.lineTo(cx-W*.07,cy+H*.12); ctx.lineTo(cx+W*.07,cy+H*.12); ctx.fill();
  // Cheekbone highlights（上移）
  ctx.strokeStyle='rgba(180,180,180,.2)'; ctx.lineWidth=W*.02; ctx.lineCap='round';
  [-1,1].forEach(s=>{ctx.beginPath();ctx.moveTo(cx+s*W*.18,cy-H*.03);ctx.lineTo(cx+s*W*.32,cy+H*.07);ctx.stroke();});
  // Teeth（上移，對齊嘴部）
  const tW=W*.48/7,tStartX=cx-W*.24,tY=cy+H*.13;
  for(let i=0;i<7;i++){
    ctx.fillStyle=i%2===0?'rgba(228,228,218,.9)':'rgba(200,200,190,.9)';
    ctx.fillRect(tStartX+i*tW+1,tY,tW-2,H*.10);
    ctx.strokeStyle='rgba(80,80,80,.45)'; ctx.lineWidth=1; ctx.strokeRect(tStartX+i*tW+1,tY,tW-2,H*.10);
  }
  // Crack
  ctx.strokeStyle='rgba(80,80,80,.4)'; ctx.lineWidth=W*.01; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(cx-W*.04,cy-H*.42); ctx.lineTo(cx+W*.02,cy-H*.3); ctx.lineTo(cx-W*.02,cy-H*.22); ctx.lineTo(cx+W*.05,cy-H*.14); ctx.stroke();
}

// ── Celebration: particles + sound ───────────
function triggerCelebration(){
  playCelebrationSound();
  // Spawn particles at center of AR canvas
  const cx=arCnv.width/2, cy=arCnv.height*.4;
  for(let i=0;i<28;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*5;
    particles.push({
      x:cx, y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      life:1.0,
      decay:0.018+Math.random()*.012,
      size:3+Math.random()*4,
      color:['#00ff88','#00d4ff','#ff3cac','#ffe600','#ff7f00'][i%5]
    });
  }
}

function playCelebrationSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((freq,i)=>{
      const osc=ac.createOscillator(), gain=ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value=freq; osc.type='sine';
      const t=ac.currentTime+i*.1;
      gain.gain.setValueAtTime(.12,t);
      gain.gain.exponentialRampToValueAtTime(.001,t+.28);
      osc.start(t); osc.stop(t+.3);
    });
  }catch(e){}
}

function updateParticles(ctx){
  particles=particles.filter(p=>p.life>0);
  if(particles.length===0) return;
  ctx.save();
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=p.decay;
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── AI Stats HUD (for detect tab) ─────────────
function getFaceAngle(){
  if(landmarks.length<455) return 0;
  const l=landmarks[234],r=landmarks[454];
  if(!l||!r) return 0;
  return Math.round(Math.atan2(r.y-l.y,r.x-l.x)*180/Math.PI);
}

function drawAIHud(ctx,W,H){
  const angle=getFaceAngle();
  const hasFace=landmarks.length>0;
  const hw=Math.min(W*.42,170), hh=68, hx=W-8, hy=8;
  // Panel background
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.65)';
  ctx.strokeStyle='rgba(0,255,136,.3)';
  ctx.lineWidth=1;
  ctx.beginPath();
  const r=7;
  ctx.moveTo(hx-hw+r,hy); ctx.lineTo(hx-r,hy); ctx.arcTo(hx,hy,hx,hy+r,r);
  ctx.lineTo(hx,hy+hh-r); ctx.arcTo(hx,hy+hh,hx-r,hy+hh,r);
  ctx.lineTo(hx-hw+r,hy+hh); ctx.arcTo(hx-hw,hy+hh,hx-hw,hy+hh-r,r);
  ctx.lineTo(hx-hw,hy+r); ctx.arcTo(hx-hw,hy,hx-hw+r,hy,r);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Stats rows
  const rows=[
    ['🧠 偵測信心',hasFace?'高':'--',hasFace?'#00ff88':'#555'],
    ['📐 臉部傾斜',hasFace?`${angle}°`:'--','#00d4ff'],
    ['⚡ 處理速度',`${frameMs}ms`,frameMs<50?'#00ff88':frameMs<100?'#ffe600':'#ff3344'],
  ];
  const fs=clamp(8,W*.018,11);
  ctx.font=`bold ${fs}px Nunito,sans-serif`;
  rows.forEach(([label,val,col],i)=>{
    const y=hy+17+i*18;
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.textAlign='left';
    ctx.fillText(label,hx-hw+9,y);
    ctx.fillStyle=col; ctx.textAlign='right';
    ctx.fillText(val,hx-8,y);
  });
  ctx.restore();
}

// ── Start / Stop Camera ───────────────────────
btnStart.addEventListener('click', async () => {
  // 已啟動 → 停止相機
  if(camReady){
    stopCamera();
    return;
  }
  // 啟動中 → 忽略連點
  if(btnStart.disabled) return;

  updateCamBtn('loading');
  setStatus('yellow','正在存取相機權限…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:640}, height:{ideal:480}}
    });
    video.srcObject = stream;
    await video.play();
    camReady = true;
    updateCamBtn('active');

    if(!faceMesh){
      setStatus('yellow','載入 AI 模型中…');
      initFaceMesh();
    } else {
      // 模型已載入（重新啟動相機），直接恢復偵測
      setStatus('green','✅ 攝影機已就緒！');
    }
  } catch(e){
    updateCamBtn('idle');
    setStatus('red','❌ 攝影機啟動失敗：'+e.message);
    console.error(e);
  }
});

// ── MediaPipe FaceMesh Init ───────────────────
function initFaceMesh(){
  faceMesh = new FaceMesh({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  faceMesh.onResults((results) => {
    const now=Date.now(); frameMs=Math.round(now-lastDetectTime); lastDetectTime=now;
    if(!faceReady){
      faceReady = true;
      setStatus('green','✅ AI 已就緒，請對準鏡頭 😄');
    }
    if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0){
      landmarks = results.multiFaceLandmarks[0];
      if(!faceFirstDetected){ faceFirstDetected=true; triggerCelebration(); }
      setStatus('green','✅ 偵測到臉！');
    } else {
      landmarks = [];
      if(faceFirstDetected) setStatus('green','👀 找不到臉，調整角度？');
    }
  });

  // 手動處理視訊影格，限制 AI 推論至約 20fps 以節省 CPU
  const AI_INTERVAL = 50; // ms → ~20fps
  let isProcessing = false;
  let lastPredictTime = 0;

  async function predict(now) {
    requestAnimationFrame(predict);
    if(!camReady || !faceMesh || isProcessing || video.paused || video.ended) return;
    if(now - lastPredictTime < AI_INTERVAL) return;
    lastPredictTime = now;
    isProcessing = true;
    try {
      await faceMesh.send({image: video});
    } catch(e){
      console.warn("AI 處理異常:", e);
    }
    isProcessing = false;
  }

  // 開始偵測循環
  requestAnimationFrame(predict);
}

// ── Upload + Green Screen ─────────────────────
document.getElementById('btn-upload').addEventListener('click',()=>fileIn.click());

fileIn.addEventListener('change',(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    const oc=document.createElement('canvas');
    oc.width=img.width; oc.height=img.height;
    const oc2=oc.getContext('2d');
    oc2.drawImage(img,0,0);
    const id=oc2.getImageData(0,0,oc.width,oc.height);
    removeGreenWhite(id);
    oc2.putImageData(id,0,0);

    // try marker crop
    const cropped = detectAndCrop(oc, oc2);
    monsterImg = cropped || oc;
    // 計算被去除的透明比例，提醒使用者
    const chkId=oc2.getImageData(0,0,oc.width,oc.height);
    let transCnt=0;
    for(let j=3;j<chkId.data.length;j+=4) if(chkId.data[j]<10) transCnt++;
    const transRatio=transCnt/(oc.width*oc.height);
    if(transRatio>0.65){
      setStatus('yellow',`⚠️ 有 ${Math.round(transRatio*100)}% 被透明化，建議減少綠色或白色`);
    } else {
      setStatus('green','🎨 怪物已上傳！');
    }
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  };
  img.src=url;
  fileIn.value='';
});

function removeGreenWhite(id){
  const d=id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if((g>90&&g>r*1.35&&g>b*1.35)||(r>215&&g>215&&b>215)) d[i+3]=0;
  }
}

function detectAndCrop(oc, oc2){
  try{
    const W=oc.width, H=oc.height;
    const id=oc2.getImageData(0,0,W,H);
    const d=id.data;
    function isDark(x,y){
      if(x<0||x>=W||y<0||y>=H) return false;
      const i=(y*W+x)*4;
      return d[i]<60&&d[i+1]<60&&d[i+2]<60&&d[i+3]>180;
    }
    function findMarker(x0,x1,y0,y1){
      let minX=x1,maxX=x0,minY=y1,maxY=y0,found=false;
      for(let y=y0;y<y1;y+=2) for(let x=x0;x<x1;x+=2){
        if(isDark(x,y)){minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);found=true;}
      }
      return found?{cx:(minX+maxX)/2,cy:(minY+maxY)/2}:null;
    }
    const qw=Math.floor(W*.22),qh=Math.floor(H*.15);
    const tl=findMarker(0,qw,0,qh),tr=findMarker(W-qw,W,0,qh);
    const bl=findMarker(0,qw,H-qh,H),br=findMarker(W-qw,W,H-qh,H);
    if(!tl||!tr||!bl||!br) return null;
    const pad=Math.min(W,H)*.02;
    const cx=Math.max(0,Math.min(tl.cx,bl.cx)+pad);
    const cy=Math.max(0,Math.min(tl.cy,tr.cy)+pad);
    const cw=Math.min(W,Math.max(tr.cx,br.cx)-pad)-cx;
    const ch=Math.min(H,Math.max(bl.cy,br.cy)-pad)-cy;
    if(cw<10||ch<10) return null;
    const nc=document.createElement('canvas');
    nc.width=Math.round(cw); nc.height=Math.round(ch);
    const nc2=nc.getContext('2d');
    nc2.drawImage(oc,-cx,-cy);
    const nid=nc2.getImageData(0,0,nc.width,nc.height);
    removeGreenWhite(nid);
    nc2.putImageData(nid,0,0);
    return nc;
  }catch(e){return null;}
}

document.getElementById('btn-capture').addEventListener('click',()=>{

});

(function drawTemplate(){
  const canvas=document.getElementById('templateCanvas');
  const ctx=canvas.getContext('2d');
  const W=595,H=842;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  function drawMarker(x,y){
    const S=32;
    ctx.fillStyle='#111';ctx.fillRect(x,y,S,S);

  function dRect(x,y,w,h,lbl,col){

    ctx.fillStyle=col;ctx.font='bold 11px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText(lbl,x+w/2,y-5);

// ── Service Worker 註冊 + 自動更新提示 ──────────
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {

      // 偵測到新版 SW 正在安裝
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          // 新版已就緒（waiting），且目前有舊版在運行
          if(newSW.state === 'installed' && navigator.serviceWorker.controller){
            const bar = document.getElementById('update-bar');
            bar.classList.add('show');
            bar.addEventListener('click', () => {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            });
          }
        });
      });

    }).catch(err => console.warn('SW 註冊失敗:', err));

    // 當新 SW 接管後，重新載入頁面套用最新版
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  });
}
